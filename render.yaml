services:
  - type: web
    name: intertext-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AUDIO_BASE_URL
        sync: false
